<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Love Spinner · A/B作答 → 综合方案</title>
  <style>
    :root{
      --paper:#fbf3ef;
      --ink:#241c19;
      --muted: rgba(36,28,25,0.66);
      --muted2: rgba(36,28,25,0.52);
      --rose:#c67a86;
      --rose2:#e8b7a7;
      --latte:#b8927a;
      --card: rgba(255,255,255,0.82);
      --border: rgba(36,28,25,0.10);
      --border2: rgba(36,28,25,0.14);
      --radius: 22px;
      --shadow: 0 18px 60px rgba(0,0,0,0.12);
      --pad: clamp(18px, 4vw, 46px);
      --h1: clamp(18px, 2.1vw, 22px);
      --q: clamp(20px, 3.2vw, 34px);
      --body: clamp(0.98rem, 1.8vw, 1.15rem);
      --small: clamp(0.80rem, 1.2vw, 0.95rem);
      --gap: clamp(10px, 2vw, 16px);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 600px at 12% 10%, rgba(232,183,167,0.35), transparent 60%),
        radial-gradient(850px 560px at 86% 16%, rgba(198,122,134,0.22), transparent 62%),
        radial-gradient(900px 650px at 55% 92%, rgba(184,146,122,0.18), transparent 64%),
        linear-gradient(180deg, #fff, var(--paper));
    }
    a{color:inherit}
    .wrap{max-width:1080px;margin:0 auto;padding:24px 14px 60px}

    header{
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
      padding:16px 16px;
      border:1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .brand{display:flex;align-items:center;gap:10px;}
    .heart{width:10px;height:10px;border-radius:99px;background:linear-gradient(135deg,var(--rose),var(--rose2));box-shadow:0 0 0 8px rgba(198,122,134,0.10);} 
    h1{margin:0;font-size:var(--h1);letter-spacing:0.1px}
    .sub{margin-top:6px;color:var(--muted);font-size:var(--small);line-height:1.45}
    .topRight{display:flex;flex-direction:column;align-items:flex-end;gap:8px}

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    select,button,textarea,input{
      font-family:inherit;
      border-radius:14px;
      border:1px solid var(--border2);
      background: rgba(255,255,255,0.70);
      color: var(--ink);
      padding:10px 12px;
      outline:none;
    }
    select,input{font-size:13px}
    button{cursor:pointer;font-weight:800;letter-spacing:0.1px}
    button.primary{background: rgba(198,122,134,0.14); border-color: rgba(198,122,134,0.24)}
    button.ghost{background: transparent}
    button:disabled{opacity:0.55;cursor:not-allowed}

    .progressWrap{width:min(340px, 64vw)}
    .progressTop{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px}
    .bar{height:10px;border-radius:999px;border:1px solid rgba(36,28,25,0.10);background:rgba(255,255,255,0.50);overflow:hidden}
    .fill{height:100%;width:0%;background:linear-gradient(90deg, rgba(198,122,134,0.55), rgba(232,183,167,0.65));}

    .panel{
      margin-top: 14px;
      border:1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panelH{
      padding:14px 16px;
      border-bottom: 1px solid rgba(36,28,25,0.08);
      display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    }
    .panelH .left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .pill{padding:6px 10px;border-radius:999px;border:1px solid rgba(36,28,25,0.10);background:rgba(255,255,255,0.55);font-size:12px;color:var(--muted)}
    .panelB{padding:16px}

    .q{
      text-align:center;
      font-size: var(--q);
      font-weight: 950;
      line-height: 1.25;
      letter-spacing:-0.01em;
      margin: 10px 0 0;
    }
    .qMeta{margin-top:10px;color:var(--muted2);font-size:var(--small)}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;align-items:start}
    @media(max-width: 880px){.grid{grid-template-columns:1fr}}

    .card{
      border:1px solid rgba(36,28,25,0.10);
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      padding: 12px;
    }
    .cardTitle{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .tag{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:12px;background:rgba(198,122,134,0.14);border:1px solid rgba(198,122,134,0.22);font-weight:950;color:rgba(36,28,25,0.76)}
    .who{font-weight:900;color:rgba(36,28,25,0.86)}

    textarea{width:100%;min-height:110px;resize:vertical;line-height:1.55;font-size:var(--body);background:rgba(255,255,255,0.76)}

    .micBtn{display:inline-flex;align-items:center;gap:8px;font-size:12px;padding:8px 10px;border-radius:14px}
    .micDot{width:8px;height:8px;border-radius:99px;background:rgba(198,122,134,0.55)}
    .micBtn.recording{background:rgba(198,122,134,0.16);border-color:rgba(198,122,134,0.30)}

    .summary{
      margin-top: 12px;
      border:1px solid rgba(36,28,25,0.10);
      border-radius: 18px;
      background: rgba(255,255,255,0.78);
      padding: 12px;
    }
    .summary h3{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:rgba(36,28,25,0.70)}
    .summaryBox{white-space:pre-wrap;line-height:1.6;font-size:var(--body);color:rgba(36,28,25,0.88)}

    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:12px}

    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
      background:rgba(255,255,255,0.92);border:1px solid rgba(36,28,25,0.12);padding:10px 12px;border-radius:14px;
      color:rgba(36,28,25,0.88);font-size:13px;box-shadow: var(--shadow);opacity:0;pointer-events:none;transition:opacity .16s ease}
    .toast.show{opacity:1}

    dialog{border:none;border-radius:20px;box-shadow: 0 30px 120px rgba(0,0,0,0.28);width:min(860px, 92vw);}
    dialog::backdrop{background: rgba(0,0,0,0.35)}
    .dlgH{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(36,28,25,0.10)}
    .dlgT{font-weight:950}
    .dlgB{padding:14px 16px}
    .list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:860px){.list{grid-template-columns:1fr}}
    .item{border:1px solid rgba(36,28,25,0.10);border-radius:16px;background:rgba(255,255,255,0.70);padding:12px}
    .item .t{font-weight:900}
    .item .m{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.5}
    .item .badge{display:inline-block;margin-left:8px;font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid rgba(36,28,25,0.10);color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="brand"><span class="heart"></span><div>
          <h1>Love Spinner</h1>
          <div class="sub">A / B 分别作答（打字或语音）→ 自动生成「综合方案」→ 保存 → 下一题。全程本地保存，不上传。</div>
        </div></div>
      </div>
      <div class="topRight">
        <div class="row">
          <select id="topicSel"></select>
          <button id="spinBtn" class="primary">转一下</button>
          <button id="overviewBtn" class="ghost">总览</button>
        </div>
        <div class="progressWrap">
          <div class="progressTop"><span id="progressText">0 / 0</span><span id="topicText">—</span></div>
          <div class="bar"><div class="fill" id="progressFill"></div></div>
        </div>
      </div>
    </header>

    <section class="panel">
      <div class="panelH">
        <div class="left">
          <span class="pill" id="qid">—</span>
          <span class="pill" id="qindex">—</span>
        </div>
        <div class="row">
          <button id="prevBtn" class="ghost">上一题</button>
          <button id="nextBtn" class="primary">下一题</button>
        </div>
      </div>
      <div class="panelB">
        <div class="q" id="qText">加载题库中…</div>
        <div class="qMeta" id="qHint">—</div>

        <div class="grid">
          <div class="card">
            <div class="cardTitle">
              <div style="display:flex;align-items:center;gap:10px"><span class="tag">A</span><span class="who">我的视角</span></div>
              <button class="micBtn" id="micA" type="button"><span class="micDot"></span><span>语音输入</span></button>
            </div>
            <textarea id="ansA" placeholder="你怎么看？可以写要点/底线/担心/期待…"></textarea>
          </div>

          <div class="card">
            <div class="cardTitle">
              <div style="display:flex;align-items:center;gap:10px"><span class="tag">B</span><span class="who">对方视角</span></div>
              <button class="micBtn" id="micB" type="button"><span class="micDot"></span><span>语音输入</span></button>
            </div>
            <textarea id="ansB" placeholder="你猜对方怎么看？或把对方原话贴进来…"></textarea>
          </div>
        </div>

        <div class="summary">
          <h3>综合方案（A + B）</h3>
          <div class="summaryBox" id="summaryBox">（还没有生成。先写 A / B，再点“生成综合方案”。）</div>
          <div class="actions">
            <button id="genBtn" class="ghost">生成综合方案</button>
            <button id="saveBtn" class="primary">保存</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <dialog id="overviewDlg">
    <div class="dlgH">
      <div class="dlgT">本轮总览</div>
      <button id="closeOverview" class="ghost">关闭</button>
    </div>
    <div class="dlgB">
      <div class="list" id="overviewList"></div>
      <div style="margin-top:12px;color:var(--muted);font-size:12px;line-height:1.5">
        提示：总览用于获得“进度感”。点击某一条会跳转到对应题目。
      </div>
    </div>
  </dialog>

  <div class="toast" id="toast">Saved</div>

<script>
  const BANK_URL = '../question_bank_v0.json';
  const LS_KEY = 'love_spinner_v2_ab_session';

  const el = (id)=>document.getElementById(id);
  const topicSel = el('topicSel');
  const spinBtn = el('spinBtn');
  const prevBtn = el('prevBtn');
  const nextBtn = el('nextBtn');
  const overviewBtn = el('overviewBtn');

  const qText = el('qText');
  const qHint = el('qHint');
  const qid = el('qid');
  const qindex = el('qindex');
  const topicText = el('topicText');

  const ansA = el('ansA');
  const ansB = el('ansB');
  const genBtn = el('genBtn');
  const saveBtn = el('saveBtn');
  const summaryBox = el('summaryBox');

  const micA = el('micA');
  const micB = el('micB');

  const progressText = el('progressText');
  const progressFill = el('progressFill');

  const overviewDlg = el('overviewDlg');
  const overviewList = el('overviewList');
  const closeOverview = el('closeOverview');

  const toastEl = el('toast');

  let bank = [];
  let list = [];
  let idx = 0;
  let current = null;

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'), 1200);
  }

  function loadSession(){
    try{ return JSON.parse(localStorage.getItem(LS_KEY) || '{"items":{}}'); }
    catch{ return { items: {} }; }
  }
  function saveSession(sess){
    localStorage.setItem(LS_KEY, JSON.stringify(sess));
  }

  function topics(){
    const t = new Set(bank.map(q=>q.topic).filter(Boolean));
    return ['全主题混抽', ...Array.from(t)];
  }
  function setTopicOptions(){
    topicSel.innerHTML = topics().map(t=>`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  }

  function filtered(){
    const t = topicSel.value;
    if(!t || t==='全主题混抽') return bank;
    return bank.filter(q=>q.topic===t);
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function buildList(){
    list = shuffle(filtered());
    if(!list.length) list = [];
    idx = 0;
    setCurrent(list[0] || null);
  }

  function setCurrent(q){
    current = q;
    if(!current){
      qText.textContent = '（题库为空）';
      qHint.textContent = '—';
      qid.textContent = '—';
      qindex.textContent = '—';
      topicText.textContent = '—';
      return;
    }

    topicText.textContent = current.topic || '—';
    qid.textContent = `ID: ${current.id || '—'}`;
    qindex.textContent = `${idx+1} / ${list.length}`;

    qText.textContent = current.text || '—';
    qHint.textContent = current.hint || 'A / B 分别写下你们的想法，再生成综合方案。';

    const sess = loadSession();
    const it = (sess.items || {})[current.id] || null;
    ansA.value = it?.a || '';
    ansB.value = it?.b || '';
    summaryBox.textContent = it?.summary || '（还没有生成。先写 A / B，再点“生成综合方案”。）';

    updateProgress();
  }

  function updateProgress(){
    const sess = loadSession();
    const answered = Object.keys(sess.items || {}).length;
    const total = list.length || 0;
    progressText.textContent = `${Math.min(answered, total)} / ${total}`;
    const pct = total ? Math.min(100, Math.round((answered/total)*100)) : 0;
    progressFill.style.width = pct + '%';
  }

  function next(){ if(idx < list.length-1){ idx++; setCurrent(list[idx]); } }
  function prev(){ if(idx > 0){ idx--; setCurrent(list[idx]); } }

  function normalizeLines(s){
    return String(s||'').trim().replace(/\r\n/g,'\n').replace(/\n{3,}/g,'\n\n');
  }

  function bulletsFromText(s){
    const t = normalizeLines(s);
    if(!t) return [];
    const raw = t
      .split(/\n|[。！？!?；;]+/)
      .map(x=>x.trim())
      .filter(Boolean);
    return raw.slice(0, 6);
  }

  function genSummary(){
    const a = bulletsFromText(ansA.value);
    const b = bulletsFromText(ansB.value);
    if(!a.length && !b.length){
      summaryBox.textContent = '（先写 A / B 再生成）';
      return;
    }

    const out = [];
    out.push('综合方案（草案）');
    out.push('');
    if(a.length){ out.push('A 关键点：'); a.forEach(x=>out.push(`- ${x}`)); out.push(''); }
    if(b.length){ out.push('B 关键点：'); b.forEach(x=>out.push(`- ${x}`)); out.push(''); }

    out.push('我们可以这样合并：');
    out.push('- 先对齐共同目标：把“感受/需求”说清楚，再谈“具体安排”。');
    out.push('- 先选 1 个最小可执行动作（48小时内），验证可行性。');
    out.push('- 对冲突点设一个边界句 + 一个备选方案（避免拉扯）。');

    summaryBox.textContent = out.join('\n');
  }

  function save(){
    if(!current) return;
    const sess = loadSession();
    if(!sess.items) sess.items = {};
    const payload = {
      qid: current.id,
      topic: current.topic,
      text: current.text,
      a: normalizeLines(ansA.value),
      b: normalizeLines(ansB.value),
      summary: normalizeLines(summaryBox.textContent),
      ts: Date.now(),
    };
    sess.items[current.id] = payload;
    saveSession(sess);
    toast('已保存');
    updateProgress();
  }

  function short(s, n){
    const t = String(s||'').trim();
    if(t.length<=n) return t;
    return t.slice(0, n-1) + '…';
  }

  function openOverview(){
    const sess = loadSession();
    const items = sess.items || {};
    overviewList.innerHTML = list.map((q, k)=>{
      const done = Boolean(items[q.id]);
      const badge = done ? '<span class="badge">已填写</span>' : '<span class="badge">未填写</span>';
      return `
        <div class="item" data-k="${k}">
          <div class="t">${escapeHtml(q.topic||'—')} ${badge}</div>
          <div class="m">${escapeHtml(short(q.text||'', 70))}</div>
        </div>
      `;
    }).join('');

    [...overviewList.querySelectorAll('.item')].forEach(div=>{
      div.onclick = ()=>{
        const k = Number(div.getAttribute('data-k')||'0');
        if(Number.isFinite(k)){
          idx = Math.max(0, Math.min(list.length-1, k));
          setCurrent(list[idx]);
        }
        overviewDlg.close();
      };
    });

    overviewDlg.showModal();
  }

  // Voice input (Web Speech API)
  function getRecognizer(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) return null;
    const r = new SR();
    r.lang = 'zh-CN';
    r.interimResults = true;
    r.continuous = false;
    return r;
  }

  function wireMic(btn, textarea){
    const rec = getRecognizer();
    if(!rec){
      btn.disabled = true;
      btn.title = '当前浏览器不支持语音输入';
      return;
    }

    let recording = false;
    let finalText = '';

    const setUI = ()=>{
      btn.classList.toggle('recording', recording);
      btn.innerHTML = recording ? '<span class="micDot"></span><span>录音中…</span>' : '<span class="micDot"></span><span>语音输入</span>';
    };

    rec.onresult = (e)=>{
      let interim = '';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const res = e.results[i];
        const txt = res[0]?.transcript || '';
        if(res.isFinal) finalText += txt;
        else interim += txt;
      }
      const base = textarea.value;
      const append = (finalText || interim).trim();
      if(!append) return;
      const merged = base + (base && !base.endsWith('\n') ? '\n' : '') + append;
      textarea.value = merged;
    };

    rec.onerror = ()=>{ recording = false; setUI(); };
    rec.onend = ()=>{ recording = false; setUI(); finalText=''; };

    btn.onclick = ()=>{
      if(recording){
        try{ rec.stop(); }catch{}
        recording = false; setUI();
        return;
      }
      recording = true; setUI();
      try{ rec.start(); }catch{ recording=false; setUI(); }
    };

    setUI();
  }

  function escapeHtml(s){
    return String(s||'')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  async function init(){
    const r = await fetch(BANK_URL, { cache: 'no-store' });
    bank = await r.json();
    setTopicOptions();
    buildList();
  }

  topicSel.onchange = ()=>buildList();
  spinBtn.onclick = ()=>buildList();
  nextBtn.onclick = ()=>next();
  prevBtn.onclick = ()=>prev();

  genBtn.onclick = ()=>genSummary();
  saveBtn.onclick = ()=>save();

  overviewBtn.onclick = ()=>openOverview();
  closeOverview.onclick = ()=>overviewDlg.close();

  document.addEventListener('keydown', (e)=>{
    if(e.key==='ArrowRight') next();
    if(e.key==='ArrowLeft') prev();
    if(e.key==='Enter' && (e.metaKey || e.ctrlKey)) save();
  });

  wireMic(micA, ansA);
  wireMic(micB, ansB);

  init().catch(err=>{
    qText.textContent = '题库加载失败。';
    console.error(err);
  });
</script>
</body>
</html>
