<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Love Spinner · 选项表态 → 综合答案</title>
  <style>
    :root{
      --paper:#fbf3ef;
      --ink:#241c19;
      --muted: rgba(36,28,25,0.66);
      --muted2: rgba(36,28,25,0.52);
      --rose:#c67a86;
      --rose2:#e8b7a7;
      --latte:#b8927a;
      --card: rgba(255,255,255,0.84);
      --border: rgba(36,28,25,0.10);
      --border2: rgba(36,28,25,0.14);
      --radius: 22px;
      --shadow: 0 18px 60px rgba(0,0,0,0.12);
      --pad: clamp(18px, 4vw, 46px);
      --h1: clamp(18px, 2.1vw, 22px);
      --q: clamp(22px, 3.6vw, 38px);
      --body: clamp(0.98rem, 1.8vw, 1.15rem);
      --small: clamp(0.80rem, 1.2vw, 0.95rem);
      --gap: clamp(10px, 2vw, 16px);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 600px at 12% 10%, rgba(232,183,167,0.35), transparent 60%),
        radial-gradient(850px 560px at 86% 16%, rgba(198,122,134,0.22), transparent 62%),
        radial-gradient(900px 650px at 55% 92%, rgba(184,146,122,0.18), transparent 64%),
        linear-gradient(180deg, #fff, var(--paper));
    }
    .wrap{max-width:1120px;margin:0 auto;padding:24px 14px 60px}

    header{
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
      flex-wrap: wrap;
      padding:16px 16px;
      border:1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    header > div:first-child{flex: 1 1 420px; min-width: 280px;}
    .topRight{flex: 0 0 auto; min-width: min(520px, 100%);}
    @media(max-width: 720px){
      .topRight{width:100%; align-items:stretch;}
      .row{justify-content:flex-start;}
      .progressWrap{width:100%;}
    }
    .brand{display:flex;align-items:center;gap:10px;}
    .heart{width:10px;height:10px;border-radius:99px;background:linear-gradient(135deg,var(--rose),var(--rose2));box-shadow:0 0 0 8px rgba(198,122,134,0.10);} 
    h1{margin:0;font-size:var(--h1);letter-spacing:0.1px}
    .sub{margin-top:6px;color:var(--muted);font-size:var(--small);line-height:1.45}
    .topRight{display:flex;flex-direction:column;align-items:flex-end;gap:8px}

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    select,button,textarea,input{
      font-family:inherit;
      border-radius:14px;
      border:1px solid var(--border2);
      background: rgba(255,255,255,0.74);
      color: var(--ink);
      padding:10px 12px;
      outline:none;
    }
    select,input{font-size:13px}
    button{cursor:pointer;font-weight:850;letter-spacing:0.1px}
    button.primary{background: rgba(198,122,134,0.14); border-color: rgba(198,122,134,0.24)}
    button.ghost{background: transparent}
    button:disabled{opacity:0.55;cursor:not-allowed}

    .progressWrap{width:min(380px, 70vw)}
    .progressTop{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px}
    .bar{height:10px;border-radius:999px;border:1px solid rgba(36,28,25,0.10);background:rgba(255,255,255,0.55);overflow:hidden}
    .fill{height:100%;width:0%;background:linear-gradient(90deg, rgba(198,122,134,0.58), rgba(232,183,167,0.70));}

    .sparkle{position:absolute;right:-6px;top:-18px;font-size:16px;opacity:0;transform:translateY(6px) scale(.8);filter:drop-shadow(0 6px 10px rgba(0,0,0,0.15));}
    .sparkle.on{animation:spark 900ms cubic-bezier(.2,.8,.2,1) forwards;}
    @keyframes spark{0%{opacity:0;transform:translateY(10px) scale(.7) rotate(-8deg);}35%{opacity:1;transform:translateY(-4px) scale(1.08) rotate(6deg);}70%{opacity:1;transform:translateY(-10px) scale(1.0) rotate(-2deg);}100%{opacity:0;transform:translateY(-16px) scale(.9) rotate(0deg);}}
    .progressWrap{position:relative}

    .panel{ margin-top:14px; border:1px solid var(--border); border-radius: var(--radius); background: var(--card); box-shadow: var(--shadow); overflow:hidden; }
    .panelH{ padding:14px 16px; border-bottom: 1px solid rgba(36,28,25,0.08); display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap; }
    .panelH .left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .pill{padding:6px 10px;border-radius:999px;border:1px solid rgba(36,28,25,0.10);background:rgba(255,255,255,0.60);font-size:12px;color:var(--muted)}
    .panelB{padding:16px; position:relative;}

    /* Motion v1 (B+C): transitions & micro-interactions (no over-effect) */
    .panelB.motion{ will-change: transform, opacity; }
    .panelB.slide-out-left{ animation: slideOutLeft 220ms cubic-bezier(.2,.8,.2,1) forwards; }
    .panelB.slide-in-right{ animation: slideInRight 280ms cubic-bezier(.2,.8,.2,1) forwards; }
    .panelB.slide-out-right{ animation: slideOutRight 220ms cubic-bezier(.2,.8,.2,1) forwards; }
    .panelB.slide-in-left{ animation: slideInLeft 280ms cubic-bezier(.2,.8,.2,1) forwards; }

    @keyframes slideOutLeft{ to{ opacity:0; transform: translateX(-14px); } }
    @keyframes slideInRight{ from{ opacity:0; transform: translateX(16px); } to{ opacity:1; transform: translateX(0); } }
    @keyframes slideOutRight{ to{ opacity:0; transform: translateX(14px); } }
    @keyframes slideInLeft{ from{ opacity:0; transform: translateX(-16px); } to{ opacity:1; transform: translateX(0); } }

    @media (prefers-reduced-motion: reduce){
      .panelB.slide-out-left,.panelB.slide-in-right,.panelB.slide-out-right,.panelB.slide-in-left{ animation:none !important; }
    }

    /* Option box micro */
    .optBox{ transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease; }
    .optBox:hover{ transform: translateY(-1px); box-shadow: 0 16px 42px rgba(0,0,0,0.10); border-color: rgba(198,122,134,0.22); }
    .optBox:active{ transform: translateY(0px) scale(0.995); }

    button{ transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease; }
    button.primary:hover{ box-shadow: 0 14px 36px rgba(198,122,134,0.18); transform: translateY(-1px); }
    button.primary:active{ transform: translateY(0) scale(0.99); }

    .pickBtn{ transition: transform 120ms ease, box-shadow 120ms ease; }
    .pickBtn:hover{ transform: translateY(-1px); }
    .pickBtn:active{ transform: translateY(0) scale(0.99); }
    .pickBtn.active{ box-shadow: 0 12px 30px rgba(198,122,134,0.14); }

    .q{ text-align:center; font-size: var(--q); font-weight: 980; line-height: 1.2; letter-spacing:-0.012em; margin: 10px 0 0; }
    .qMeta{margin-top:10px;color:var(--muted2);font-size:var(--small)}

    .opts{margin-top:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    @media(max-width:900px){.opts{grid-template-columns:1fr}}
    .optBox{border:1px solid rgba(36,28,25,0.10);border-radius:18px;background:rgba(255,255,255,0.76);padding:12px}
    .optTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .tag{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:12px;background:rgba(198,122,134,0.14);border:1px solid rgba(198,122,134,0.22);font-weight:950;color:rgba(36,28,25,0.76)}
    .optBox textarea{min-height:72px;font-size:var(--body);line-height:1.55}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;align-items:start}
    @media(max-width: 880px){.grid{grid-template-columns:1fr}}
    .card{border:1px solid rgba(36,28,25,0.10);border-radius:18px;background:rgba(255,255,255,0.74);padding:12px}
    .cardTitle{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .who{font-weight:920;color:rgba(36,28,25,0.86)}
    textarea{width:100%;min-height:110px;resize:vertical;line-height:1.55;font-size:var(--body);background:rgba(255,255,255,0.78)}

    .pickRow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .pickBtn{display:inline-flex;align-items:center;justify-content:center;min-width:44px;height:40px;border-radius:14px;border:1px solid rgba(36,28,25,0.12);background:rgba(255,255,255,0.70);font-weight:950}
    .pickBtn.active{border-color:rgba(198,122,134,0.50);background:rgba(198,122,134,0.16)}

    .micBtn{display:inline-flex;align-items:center;gap:8px;font-size:12px;padding:8px 10px;border-radius:14px}
    .micDot{width:8px;height:8px;border-radius:99px;background:rgba(198,122,134,0.55)}
    .micBtn.recording{background:rgba(198,122,134,0.16);border-color:rgba(198,122,134,0.30)}

    .summary{ margin-top:12px; border:1px solid rgba(36,28,25,0.10); border-radius:18px; background:rgba(255,255,255,0.80); padding:12px; }
    .summary h3{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:rgba(36,28,25,0.70)}
    .summaryBox{white-space:pre-wrap;line-height:1.6;font-size:var(--body);color:rgba(36,28,25,0.88)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:12px}

    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
      background:rgba(255,255,255,0.92);border:1px solid rgba(36,28,25,0.12);padding:10px 12px;border-radius:14px;
      color:rgba(36,28,25,0.88);font-size:13px;box-shadow: var(--shadow);opacity:0;pointer-events:none;transition:opacity .16s ease}
    .toast.show{opacity:1}

    dialog{border:none;border-radius:20px;box-shadow: 0 30px 120px rgba(0,0,0,0.28);width:min(920px, 94vw);}
    dialog::backdrop{background: rgba(0,0,0,0.35)}
    .dlgH{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(36,28,25,0.10)}
    .dlgT{font-weight:980}
    .dlgB{padding:14px 16px}
    .list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:860px){.list{grid-template-columns:1fr}}
    .item{border:1px solid rgba(36,28,25,0.10);border-radius:16px;background:rgba(255,255,255,0.74);padding:12px;cursor:pointer}
    .item .t{font-weight:920}
    .item .m{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.5}
    .item .badge{display:inline-block;margin-left:8px;font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid rgba(36,28,25,0.10);color:var(--muted)}

    .form{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:860px){.form{grid-template-columns:1fr}}
    .field{border:1px solid rgba(36,28,25,0.10);border-radius:16px;background:rgba(255,255,255,0.74);padding:12px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    .field input{width:100%}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="brand"><span class="heart"></span><div>
          <h1>Love Spinner</h1>
          <div class="sub">先用 3 个选项快速表态（3-2-1）→ 再补充文字/语音 → 形成「综合答案」→ 保存 → 下一题。全程本地保存，不上传。</div>
        </div></div>
      </div>
      <div class="topRight">
        <div class="row">
          <select id="topicSel"></select>
          <button id="spinBtn" class="primary">开一轮</button>
          <button id="setupBtn" class="ghost">入口/信息</button>
          <button id="overviewBtn" class="ghost">总览</button>
          
          <a href="./friction.html" style="text-decoration:none"><button class="ghost" type="button">我们之间的摩擦</button></a>
        </div>
        <div class="progressWrap">
          <div class="progressTop"><span id="progressText">0 / 0</span><span id="topicText">—</span></div>
          <div class="bar"><div class="fill" id="progressFill"></div></div>
          <div id="sparkle" class="sparkle">✨</div>
        </div>
      </div>
    </header>

    <section class="panel">
      <div class="panelH">
        <div class="left">
          <span class="pill" id="qid">—</span>
          <span class="pill" id="qindex">—</span>
          <span class="pill" id="sessionPill">未设置填报信息</span>
        </div>
        <div class="row">
          <button id="prevBtn" class="ghost">上一题</button>
          <button id="nextBtn" class="primary">下一题</button>
        </div>
      </div>
      <div class="panelB motion" id="panelBody">
        <div class="q" id="qText">加载题库中…</div>
        <div class="qMeta" id="qHint">—</div>

        <div class="opts">
          <div class="optBox">
            <div class="optTop"><div style="display:flex;align-items:center;gap:10px"><span class="tag">A</span><b>选项 A</b></div></div>
            <textarea id="optA" placeholder="填选项A（建议10~15字，更具体一点）"></textarea>
          </div>
          <div class="optBox">
            <div class="optTop"><div style="display:flex;align-items:center;gap:10px"><span class="tag">B</span><b>选项 B</b></div></div>
            <textarea id="optB" placeholder="填选项B（建议10~15字，更具体一点）"></textarea>
          </div>
          <div class="optBox">
            <div class="optTop"><div style="display:flex;align-items:center;gap:10px"><span class="tag">C</span><b>选项 C</b></div></div>
            <textarea id="optC" placeholder="填选项C（建议10~15字，更具体一点）"></textarea>
          </div>
        </div>

        <div class="grid">
          <div class="card">
            <div class="cardTitle">
              <div style="display:flex;align-items:center;gap:10px"><span class="tag">我</span><span class="who" id="nameA">我的视角</span></div>
              <button class="micBtn" id="micA" type="button"><span class="micDot"></span><span>语音输入</span></button>
            </div>
            <div class="pickRow" id="pickA"></div>
            <div style="margin-top:8px"><textarea id="ansA" placeholder="补充说明：原因/底线/担心/期待…（可选）"></textarea></div>
          </div>

          <div class="card">
            <div class="cardTitle">
              <div style="display:flex;align-items:center;gap:10px"><span class="tag">TA</span><span class="who" id="nameB">对方视角</span></div>
              <button class="micBtn" id="micB" type="button"><span class="micDot"></span><span>语音输入</span></button>
            </div>
            <div class="pickRow" id="pickB"></div>
            <div style="margin-top:8px"><textarea id="ansB" placeholder="补充说明：对方可能在意什么/底层需求是什么…（可选）"></textarea></div>
          </div>
        </div>

        <div class="summary">
          <h3>综合答案（我们最终版）</h3>
          <div class="summaryBox" id="summaryBox">（建议：先 3-2-1 表态选 A/B/C，再补充几句，然后再生成综合答案。）</div>
          <div class="actions">
            <button id="genBtn" class="ghost">生成综合答案</button>
            <button id="saveBtn" class="primary">保存这一题</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <dialog id="setupDlg">
    <div class="dlgH">
      <div class="dlgT">入口 / 填报信息（仪式感）</div>
      <button id="closeSetup" class="ghost">关闭</button>
    </div>
    <div class="dlgB">
      <div class="form">
        <div class="field">
          <label>填报人（我）</label>
          <input id="whoA" placeholder="比如：Jianan" />
        </div>
        <div class="field">
          <label>对方（TA）</label>
          <input id="whoB" placeholder="比如：男嘉宾" />
        </div>
        <div class="field">
          <label>填写日期</label>
          <input id="sessDate" type="date" />
        </div>
        <div class="field">
          <label>本轮主题（可选）</label>
          <input id="sessTitle" placeholder="比如：恋爱边界对齐 / 旅行前对齐" />
        </div>
      </div>
      <div class="actions" style="margin-top:12px">
        <button id="saveSetup" class="primary">保存信息</button>
        <button id="clearAll" class="ghost">清空全部记录</button>
      </div>
      <div style="margin-top:12px;color:var(--muted);font-size:12px;line-height:1.5">
        说明：所有记录仅保存在你的浏览器本地（localStorage）。
      </div>
    </div>
  </dialog>

  <dialog id="overviewDlg">
    <div class="dlgH">
      <div class="dlgT">本轮总览（模块/进度）</div>
      <button id="closeOverview" class="ghost">关闭</button>
    </div>
    <div class="dlgB">
      <div class="list" id="overviewList"></div>
      <div style="margin-top:12px;color:var(--muted);font-size:12px;line-height:1.5">
        提示：点击某一条会跳转到对应题目；“已保存”= 你点过保存。
      </div>
    </div>
  </dialog>

  <div class="toast" id="toast">Saved</div>

<script>
  const BANK_URL = './question_bank.json';
  const LS_KEY = 'love_spinner_v3_session';
  const LS_META = 'love_spinner_v3_meta';

  const el = (id)=>document.getElementById(id);
  const topicSel = el('topicSel');
  const spinBtn = el('spinBtn');
  const prevBtn = el('prevBtn');
  const nextBtn = el('nextBtn');
  const overviewBtn = el('overviewBtn');
  const exportMdBtn = el('exportMdBtn');
  const setupBtn = el('setupBtn');

  const qText = el('qText');
  const qHint = el('qHint');
  const qid = el('qid');
  const qindex = el('qindex');
  const topicText = el('topicText');
  const sessionPill = el('sessionPill');

  const optA = el('optA');
  const optB = el('optB');
  const optC = el('optC');

  const nameAEl = el('nameA');
  const nameBEl = el('nameB');

  const pickAEl = el('pickA');
  const pickBEl = el('pickB');

  const ansA = el('ansA');
  const ansB = el('ansB');
  const genBtn = el('genBtn');
  const saveBtn = el('saveBtn');
  const summaryBox = el('summaryBox');

  const micA = el('micA');
  const micB = el('micB');

  const progressText = el('progressText');
  const progressFill = el('progressFill');

  const setupDlg = el('setupDlg');
  const closeSetup = el('closeSetup');
  const saveSetupBtn = el('saveSetup');
  const clearAllBtn = el('clearAll');
  const whoA = el('whoA');
  const whoB = el('whoB');
  const sessDate = el('sessDate');
  const sessTitle = el('sessTitle');

  const overviewDlg = el('overviewDlg');
  const overviewList = el('overviewList');
  const closeOverview = el('closeOverview');

  const toastEl = el('toast');

  let bank = [];
  let list = [];
  let idx = 0;
  let current = null;
  let picks = { a:null, b:null };
  let lastAnswered = 0;

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'), 1200);
  }

  function triggerSparkle(){
    const sp = document.getElementById('sparkle');
    if(!sp) return;
    sp.classList.remove('on');
    // force reflow
    void sp.offsetWidth;
    sp.classList.add('on');
  }


  function loadSession(){
    try{ return JSON.parse(localStorage.getItem(LS_KEY) || '{"items":{}}'); }
    catch{ return { items: {} }; }
  }
  function saveSession(sess){ localStorage.setItem(LS_KEY, JSON.stringify(sess)); }

  function loadMeta(){
    try{ return JSON.parse(localStorage.getItem(LS_META) || '{}'); }
    catch{ return {}; }
  }
  function saveMeta(m){ localStorage.setItem(LS_META, JSON.stringify(m)); }

  function applyMeta(){
    const m = loadMeta();
    const a = m.whoA || '我';
    const b = m.whoB || 'TA';
    nameAEl.textContent = a;
    nameBEl.textContent = b;
    if(m.whoA || m.whoB || m.date){
      const d = m.date ? ` · ${m.date}` : '';
      const t = m.title ? ` · ${m.title}` : '';
      sessionPill.textContent = `${a} / ${b}${d}${t}`;
    } else {
      sessionPill.textContent = '未设置填报信息';
    }
  }

  function topics(){
    const t = new Set(bank.map(q=>q.topic).filter(Boolean));
    return ['全主题混抽', ...Array.from(t)];
  }
  function setTopicOptions(){
    topicSel.innerHTML = topics().map(t=>`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  }

  function filtered(){
    const t = topicSel.value;
    if(!t || t==='全主题混抽') return bank;
    return bank.filter(q=>q.topic===t);
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function buildList(){
    list = shuffle(filtered());
    idx = 0;
    setCurrent(list[0] || null);
  }

  function setCurrent(q){
    current = q;
    picks = { a:null, b:null };

    if(!current){
      qText.textContent = '（题库为空）';
      qHint.textContent = '—';
      qid.textContent = '—';
      qindex.textContent = '—';
      topicText.textContent = '—';
      return;
    }

    topicText.textContent = current.topic || '—';
    qid.textContent = `ID: ${current.id || '—'}`;
    qindex.textContent = `${idx+1} / ${list.length}`;

    qText.textContent = current.text || '—';
    qHint.textContent = current.hint || '先写 3 个选项，再 3-2-1 表态，最后生成综合答案。';

    // defaults: take first 3 options from bank if present
    const defaults = Array.isArray(current.options) ? current.options.slice(0,3) : [];

    const sess = loadSession();
    const it = (sess.items || {})[current.id] || null;

    optA.value = it?.optA ?? (defaults[0] || '');
    optB.value = it?.optB ?? (defaults[1] || '');
    optC.value = it?.optC ?? (defaults[2] || '');

    ansA.value = it?.aText || '';
    ansB.value = it?.bText || '';

    picks.a = it?.aPick || null;
    picks.b = it?.bPick || null;

    summaryBox.textContent = it?.final || '（建议：先 3-2-1 表态选 A/B/C，再补充几句，然后再生成综合答案。）';

    renderPickButtons();
    updateProgress();
  }

  function updateProgress(){
    const sess = loadSession();
    const answered = Object.keys(sess.items || {}).length;
    const total = list.length || 0;
    progressText.textContent = `${Math.min(answered, total)} / ${total}`;
    const pct = total ? Math.min(100, Math.round((answered/total)*100)) : 0;
    progressFill.style.width = pct + '%';

    if(answered > lastAnswered){
      triggerSparkle();
      lastAnswered = answered;
    }
    if(!lastAnswered) lastAnswered = answered;
  }

  function animateTo(newIdx, dir){
    if(newIdx<0 || newIdx>=list.length) return;
    const body = el('panelBody');
    const outCls = (dir==='next') ? 'slide-out-left' : 'slide-out-right';
    const inCls  = (dir==='next') ? 'slide-in-right' : 'slide-in-left';

    prevBtn.disabled = true; nextBtn.disabled = true;

    const doIn = ()=>{
      try{ body.classList.remove(outCls); }catch{}
      setCurrent(list[newIdx]);
      idx = newIdx;
      try{ body.classList.add(inCls); }catch{}

      const finish = ()=>{
        try{ body.classList.remove(inCls); }catch{}
        prevBtn.disabled = false; nextBtn.disabled = false;
        body.removeEventListener('animationend', finish);
      };
      body.addEventListener('animationend', finish);
      setTimeout(finish, 360);
    };

    try{ body.classList.add(outCls); }catch{}
    const finishOut = ()=>{ body.removeEventListener('animationend', finishOut); doIn(); };
    body.addEventListener('animationend', finishOut);
    setTimeout(finishOut, 260);
  }

  function next(){ if(idx < list.length-1){ animateTo(idx+1, 'next'); } }
  function prev(){ if(idx > 0){ animateTo(idx-1, 'prev'); } }

  function renderPickButtons(){
    const mk = (container, key)=>{
      container.innerHTML = '';
      ['A','B','C'].forEach(L=>{
        const b = document.createElement('button');
        b.className = 'pickBtn' + (picks[key]===L ? ' active' : '');
        b.type = 'button';
        b.textContent = L;
        b.onclick = ()=>{ picks[key]=L; renderPickButtons(); };
        container.appendChild(b);
      });
    };
    mk(pickAEl,'a');
    mk(pickBEl,'b');
  }

  function normalizeLines(s){
    return String(s||'').trim().replace(/\r\n/g,'\n').replace(/\n{3,}/g,'\n\n');
  }

  function optionText(L){
    if(L==='A') return normalizeLines(optA.value);
    if(L==='B') return normalizeLines(optB.value);
    if(L==='C') return normalizeLines(optC.value);
    return '';
  }

  function genFinal(){
    if(!current) return;
    const aPick = picks.a;
    const bPick = picks.b;

    const aOpt = aPick ? optionText(aPick) : '';
    const bOpt = bPick ? optionText(bPick) : '';

    const out = [];
    out.push('综合答案（草案）');
    out.push('');

    if(aPick){ out.push(`我选择：${aPick}${aOpt ? ` — ${aOpt}`:''}`); }
    if(bPick){ out.push(`TA 选择：${bPick}${bOpt ? ` — ${bOpt}`:''}`); }
    if(aPick || bPick) out.push('');

    if(aPick && bPick && aPick===bPick){
      out.push('共同点：');
      out.push('- 你们第一反应一致，可以直接进入“如何落地”。');
      out.push('');
    } else if(aPick && bPick){
      out.push('分歧点：');
      out.push('- 你们的第一表态不同，建议先对齐底层需求（安全感/自由/确定性/被看见）。');
      out.push('');
    }

    const aTxt = normalizeLines(ansA.value);
    const bTxt = normalizeLines(ansB.value);

    if(aTxt){
      out.push('我补充：');
      out.push(aTxt);
      out.push('');
    }
    if(bTxt){
      out.push('TA 补充：');
      out.push(bTxt);
      out.push('');
    }

    out.push('我们最终可以这样写（你可直接改）：');
    out.push('- 共同目标：____');
    out.push('- 具体做法：____');
    out.push('- 边界/例外：____');
    out.push('- 复盘点：下次我们如何验证是否更舒服？');

    summaryBox.textContent = out.join('\n');
  }

  function save(){
    if(!current) return;
    const sess = loadSession();
    if(!sess.items) sess.items = {};
    const payload = {
      qid: current.id,
      topic: current.topic,
      text: current.text,
      optA: normalizeLines(optA.value),
      optB: normalizeLines(optB.value),
      optC: normalizeLines(optC.value),
      aPick: picks.a,
      bPick: picks.b,
      aText: normalizeLines(ansA.value),
      bText: normalizeLines(ansB.value),
      final: normalizeLines(summaryBox.textContent),
      ts: Date.now(),
    };
    sess.items[current.id] = payload;
    saveSession(sess);
    toast('已保存');
    updateProgress();
  }

  function short(s, n){
    const t = String(s||'').trim();
    if(t.length<=n) return t;
    return t.slice(0, n-1) + '…';
  }

  function openOverview(){
    const sess = loadSession();
    const items = sess.items || {};
    overviewList.innerHTML = list.map((q, k)=>{
      const done = Boolean(items[q.id]);
      const badge = done ? '<span class="badge">已保存</span>' : '<span class="badge">未保存</span>';
      return `
        <div class="item" data-k="${k}">
          <div class="t">${escapeHtml(q.topic||'—')} ${badge}</div>
          <div class="m">${escapeHtml(short(q.text||'', 78))}</div>
        </div>
      `;
    }).join('');

    [...overviewList.querySelectorAll('.item')].forEach(div=>{
      div.onclick = ()=>{
        const k = Number(div.getAttribute('data-k')||'0');
        if(Number.isFinite(k)){
          idx = Math.max(0, Math.min(list.length-1, k));
          setCurrent(list[idx]);
        }
        overviewDlg.close();
      };
    });

    overviewDlg.showModal();
  }

  function exportMarkdown(){
    const m = loadMeta();
    const sess = loadSession();
    const items = sess.items || {};

    const lines=[];
    lines.push('# Love Spinner 导出');
    lines.push('');
    lines.push(`- 导出时间：${new Date().toISOString()}`);
    if(m.whoA || m.whoB) lines.push(`- 填报人：${m.whoA||'我'} / ${m.whoB||'TA'}`);
    if(m.date) lines.push(`- 日期：${m.date}`);
    if(m.title) lines.push(`- 主题：${m.title}`);
    lines.push('');

    list.forEach((q, k)=>{
      const it = items[q.id];
      if(!it) return;
      lines.push(`## ${k+1}. ${it.topic||''}｜${it.text||''}`.trim());
      lines.push('');
      lines.push('**选项库（本题）**');
      lines.push(`- A：${it.optA||''}`);
      lines.push(`- B：${it.optB||''}`);
      lines.push(`- C：${it.optC||''}`);
      lines.push('');
      lines.push(`- 我表态：${it.aPick||''}`);
      lines.push(`- TA表态：${it.bPick||''}`);
      if(it.aText){
        lines.push('');
        lines.push('**我补充**');
        lines.push(it.aText);
      }
      if(it.bText){
        lines.push('');
        lines.push('**TA补充**');
        lines.push(it.bText);
      }
      lines.push('');
      lines.push('**综合答案（最终版）**');
      lines.push('');
      lines.push(it.final || '');
      lines.push('');
    });

    download(`love-spinner_${(m.date||new Date().toISOString().slice(0,10))}.md`, lines.join('\n'), 'text/markdown');
  }

  function download(filename, text, mime){
    const blob = new Blob([text], {type: mime||'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 800);
  }

  // Voice input (Web Speech API)
  function getRecognizer(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) return null;
    const r = new SR();
    r.lang = 'zh-CN';
    r.interimResults = true;
    r.continuous = false;
    return r;
  }

  function wireMic(btn, textarea){
    const rec = getRecognizer();
    if(!rec){
      btn.disabled = true;
      btn.title = '当前浏览器不支持语音输入';
      return;
    }

    let recording = false;
    let finalText = '';

    const setUI = ()=>{
      btn.classList.toggle('recording', recording);
      btn.innerHTML = recording ? '<span class="micDot"></span><span>录音中…</span>' : '<span class="micDot"></span><span>语音输入</span>';
    };

    rec.onresult = (e)=>{
      let interim = '';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const res = e.results[i];
        const txt = res[0]?.transcript || '';
        if(res.isFinal) finalText += txt;
        else interim += txt;
      }
      const base = textarea.value;
      const append = (finalText || interim).trim();
      if(!append) return;
      const merged = base + (base && !base.endsWith('\n') ? '\n' : '') + append;
      textarea.value = merged;
    };

    rec.onerror = ()=>{ recording = false; setUI(); };
    rec.onend = ()=>{ recording = false; setUI(); finalText=''; };

    btn.onclick = ()=>{
      if(recording){
        try{ rec.stop(); }catch{}
        recording = false; setUI();
        return;
      }
      recording = true; setUI();
      try{ rec.start(); }catch{ recording=false; setUI(); }
    };

    setUI();
  }

  function escapeHtml(s){
    return String(s||'')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  async function init(){
    const r = await fetch(BANK_URL, { cache: 'no-store' });
    bank = await r.json();
    setTopicOptions();
    buildList();
    applyMeta();

    // set default date if empty
    const m = loadMeta();
    if(!m.date){
      const d = new Date();
      const local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,10);
      m.date = local;
      saveMeta(m);
      applyMeta();
    }
  }

  // Events
  topicSel.onchange = ()=>buildList();
  spinBtn.onclick = ()=>buildList();
  nextBtn.onclick = ()=>next();
  prevBtn.onclick = ()=>prev();

  genBtn.onclick = ()=>genFinal();
  saveBtn.onclick = ()=>save();

  overviewBtn.onclick = ()=>openOverview();
  closeOverview.onclick = ()=>overviewDlg.close();

  exportMdBtn.onclick = ()=>exportMarkdown();

  setupBtn.onclick = ()=>{
    const m = loadMeta();
    whoA.value = m.whoA || '';
    whoB.value = m.whoB || '';
    sessDate.value = m.date || '';
    sessTitle.value = m.title || '';
    setupDlg.showModal();
  };
  closeSetup.onclick = ()=>setupDlg.close();
  saveSetupBtn.onclick = ()=>{
    const m = loadMeta();
    m.whoA = String(whoA.value||'').trim();
    m.whoB = String(whoB.value||'').trim();
    m.date = String(sessDate.value||'').trim();
    m.title = String(sessTitle.value||'').trim();
    saveMeta(m);
    applyMeta();
    toast('已保存填报信息');
    setupDlg.close();
  };

  clearAllBtn.onclick = ()=>{
    if(!confirm('确定清空全部本地记录？（仅清空当前浏览器）')) return;
    localStorage.removeItem(LS_KEY);
    toast('已清空');
    updateProgress();
  };

  document.addEventListener('keydown', (e)=>{
    if(e.key==='ArrowRight') next();
    if(e.key==='ArrowLeft') prev();
    if(e.key==='Enter' && (e.metaKey || e.ctrlKey)) save();
  });

  // pick buttons need to rerender when options edited (optional)
  optA.addEventListener('input', ()=>{});
  optB.addEventListener('input', ()=>{});
  optC.addEventListener('input', ()=>{});

  wireMic(micA, ansA);
  wireMic(micB, ansB);

  init().catch(err=>{
    qText.textContent = '题库加载失败。';
    console.error(err);
  });
</script>
</body>
