<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Love Spinner · 我们之间的摩擦（事件复盘）</title>
  <style>
    :root{
      --paper:#fbf3ef;
      --ink:#241c19;
      --muted: rgba(36,28,25,0.66);
      --muted2: rgba(36,28,25,0.52);
      --rose:#c67a86;
      --rose2:#e8b7a7;
      --card: rgba(255,255,255,0.84);
      --border: rgba(36,28,25,0.10);
      --border2: rgba(36,28,25,0.14);
      --radius: 22px;
      --shadow: 0 18px 60px rgba(0,0,0,0.12);
      --pad: clamp(18px, 4vw, 46px);
      --h1: clamp(18px, 2.1vw, 22px);
      --h2: clamp(18px, 2.8vw, 28px);
      --body: clamp(0.98rem, 1.8vw, 1.12rem);
      --small: clamp(0.80rem, 1.2vw, 0.95rem);
      --gap: clamp(10px, 2vw, 16px);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 600px at 12% 10%, rgba(232,183,167,0.35), transparent 60%),
        radial-gradient(850px 560px at 86% 16%, rgba(198,122,134,0.22), transparent 62%),
        radial-gradient(900px 650px at 55% 92%, rgba(184,146,122,0.18), transparent 64%),
        linear-gradient(180deg, #fff, var(--paper));
    }
    .wrap{max-width:1120px;margin:0 auto;padding:24px 14px 60px}
    header{
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
      flex-wrap:wrap;
      padding:16px 16px;
      border:1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .brand{display:flex;align-items:center;gap:10px;}
    .heart{width:10px;height:10px;border-radius:99px;background:linear-gradient(135deg,var(--rose),var(--rose2));box-shadow:0 0 0 8px rgba(198,122,134,0.10);} 
    h1{margin:0;font-size:var(--h1);letter-spacing:0.1px}
    .sub{margin-top:6px;color:var(--muted);font-size:var(--small);line-height:1.45}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    button,textarea,input,select{
      font-family:inherit;
      border-radius:14px;
      border:1px solid var(--border2);
      background: rgba(255,255,255,0.74);
      color: var(--ink);
      padding:10px 12px;
      outline:none;
    }
    button{cursor:pointer;font-weight:850;letter-spacing:0.1px}
    button.primary{background: rgba(198,122,134,0.14); border-color: rgba(198,122,134,0.24)}
    button.ghost{background: transparent}

    .panel{ margin-top:14px; border:1px solid var(--border); border-radius: var(--radius); background: var(--card); box-shadow: var(--shadow); overflow:hidden; }
    .panelH{ padding:14px 16px; border-bottom: 1px solid rgba(36,28,25,0.08); display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap; }
    .pill{padding:6px 10px;border-radius:999px;border:1px solid rgba(36,28,25,0.10);background:rgba(255,255,255,0.60);font-size:12px;color:var(--muted)}
    .panelB{padding:16px}

    .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:start}
    @media(max-width: 980px){.grid{grid-template-columns:1fr}}

    .card{border:1px solid rgba(36,28,25,0.10);border-radius:18px;background:rgba(255,255,255,0.78);padding:12px}
    .card h2{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:rgba(36,28,25,0.72)}
    textarea{width:100%;min-height:220px;resize:vertical;line-height:1.6;font-size:var(--body);background:rgba(255,255,255,0.82)}

    .titleMid{font-size:var(--h2);font-weight:980;line-height:1.22;letter-spacing:-0.01em;margin:2px 0 8px;text-align:center}
    .mini{color:var(--muted);font-size:12px;line-height:1.5}

    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
      background:rgba(255,255,255,0.92);border:1px solid rgba(36,28,25,0.12);padding:10px 12px;border-radius:14px;
      color:rgba(36,28,25,0.88);font-size:13px;box-shadow: var(--shadow);opacity:0;pointer-events:none;transition:opacity .16s ease}
    .toast.show{opacity:1}

    dialog{border:none;border-radius:20px;box-shadow: 0 30px 120px rgba(0,0,0,0.28);width:min(920px, 94vw);}
    dialog::backdrop{background: rgba(0,0,0,0.35)}
    .dlgH{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(36,28,25,0.10)}
    .dlgT{font-weight:980}
    .dlgB{padding:14px 16px}
    .form{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:860px){.form{grid-template-columns:1fr}}
    .field{border:1px solid rgba(36,28,25,0.10);border-radius:16px;background:rgba(255,255,255,0.74);padding:12px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    .field input{width:100%}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="brand"><span class="heart"></span><div>
          <h1>我们之间的摩擦</h1>
          <div class="sub">一个事件一个复盘：中间写事实，左边写我的感受/concern，右边给 TA 写回应/看法。保存后可导出。</div>
        </div></div>
      </div>
      <div class="row">
        <button id="setupBtn" class="ghost">入口/信息</button>
        <button id="saveBtn" class="primary">保存本次</button>
        <button id="exportBtn" class="primary">导出 MD</button>
        <a href="./index.html" style="text-decoration:none"><button class="ghost" type="button">返回 Spinner</button></a>
      </div>
    </header>

    <section class="panel">
      <div class="panelH">
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <span class="pill" id="metaPill">未设置填报信息</span>
          <span class="pill" id="eventPill">事件：实习生关键词触发吃醋</span>
        </div>
      </div>
      <div class="panelB">
        <div class="grid">
          <div class="card">
            <h2>左｜我的感受 & concern（已帮你汇总，可改）</h2>
            <textarea id="leftBox"></textarea>
          </div>

          <div class="card">
            <h2>中｜事件事实描述（可改）</h2>
            <div class="titleMid" id="midTitle">“实习生关键词触发的吃醋”</div>
            <textarea id="midBox"></textarea>
            <div class="mini" style="margin-top:10px">建议写法：发生了什么（客观）→ 他怎么说/怎么做 → 我怎么理解。</div>
          </div>

          <div class="card">
            <h2>右｜TA 的回应 & 看法（留给 TA 填）</h2>
            <textarea id="rightBox" placeholder="你可以把手机递给TA，或者把这段复制发他，让他写完再粘回来。"></textarea>
          </div>
        </div>
      </div>
    </section>
  </div>

  <dialog id="setupDlg">
    <div class="dlgH">
      <div class="dlgT">入口 / 填报信息（复盘抬头）</div>
      <button id="closeSetup" class="ghost">关闭</button>
    </div>
    <div class="dlgB">
      <div class="form">
        <div class="field">
          <label>我是谁</label>
          <input id="whoA" placeholder="比如：Jianan" />
        </div>
        <div class="field">
          <label>TA是谁</label>
          <input id="whoB" placeholder="比如：男嘉宾" />
        </div>
        <div class="field">
          <label>日期</label>
          <input id="sessDate" type="date" />
        </div>
        <div class="field">
          <label>本次事件标题</label>
          <input id="eventTitle" placeholder="比如：实习生关键词触发吃醋" />
        </div>
      </div>
      <div class="row" style="margin-top:12px;justify-content:flex-end">
        <button id="saveSetup" class="primary">保存信息</button>
      </div>
    </div>
  </dialog>

  <div class="toast" id="toast">Saved</div>

<script>
  const LS_META = 'love_spinner_v3_meta';
  const LS_FRICTION = 'love_spinner_friction_v1';

  const el = (id)=>document.getElementById(id);
  const leftBox = el('leftBox');
  const midBox = el('midBox');
  const rightBox = el('rightBox');
  const metaPill = el('metaPill');
  const eventPill = el('eventPill');
  const midTitle = el('midTitle');

  const setupBtn = el('setupBtn');
  const saveBtn = el('saveBtn');
  const exportBtn = el('exportBtn');
  const toastEl = el('toast');

  const setupDlg = el('setupDlg');
  const closeSetup = el('closeSetup');
  const saveSetup = el('saveSetup');
  const whoA = el('whoA');
  const whoB = el('whoB');
  const sessDate = el('sessDate');
  const eventTitle = el('eventTitle');

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'), 1200);
  }

  function loadMeta(){
    try{ return JSON.parse(localStorage.getItem(LS_META) || '{}'); }
    catch{ return {}; }
  }
  function saveMeta(m){ localStorage.setItem(LS_META, JSON.stringify(m)); }

  function loadF(){
    try{ return JSON.parse(localStorage.getItem(LS_FRICTION) || '{}'); }
    catch{ return {}; }
  }
  function saveF(f){ localStorage.setItem(LS_FRICTION, JSON.stringify(f)); }

  function applyMeta(){
    const m = loadMeta();
    const a = m.whoA || '我';
    const b = m.whoB || 'TA';
    const d = m.date ? ` · ${m.date}` : '';
    metaPill.textContent = `${a} / ${b}${d}`;

    const f = loadF();
    const title = f.title || '实习生关键词触发吃醋';
    eventPill.textContent = `事件：${title}`;
    midTitle.textContent = `“${title}”`;
  }

  function setDefaultsIfEmpty(){
    if(!midBox.value.trim()){
      midBox.value = [
        '【事实还原】',
        '- 我在聊天里多次提到“实习生”这个关键词。',
        '- TA 表达：他有点吃醋/介意，觉得关键词出现太多。',
        '- 表达方式：有情绪，但没有阴阳怪气或抱怨（偏直接表达介意）。',
        '- 后续动作倾向：他想蹭私教课、甚至想见一见（更像靠近我的世界来降低不安）。',
        '',
        '【我从他这里接收到的信息】',
        '- 他在意我（甜）。',
        '- 他对“我和某个异性/群体的距离”不确定，会不安。',
        '- 他倾向用“靠近我的生活”来获得安全感。',
      ].join('\n');
    }

    if(!leftBox.value.trim()){
      leftBox.value = [
        '【我的感受】',
        '- Sweet：他的吃醋让我觉得被在意；他为我开始锻炼也很甜。',
        '- 理解：我能理解他的不安全感，也愿意给一个他舒服的边界。',
        '',
        '【我的 concern（核心担心）】',
        '1) 成长曲线不一致：他跟不上会不会变成控制/抱怨？我也担心他停滞会让我魅力下降。',
        '2) 节奏不满屏：我怕关系变紧张、干涩。',
        '3) 红线：',
        '   - 不能接受他限制/束缚我（不让我成长/社交/工作）。',
        '   - 不能接受他把情绪压力丢给我背（要我哄、要我收拾）。',
        '   - 我希望被认可、欣赏、托举、为我好，而不是把我往下拉。',
      ].join('\n');
    }
  }

  function save(){
    const f = loadF();
    f.left = String(leftBox.value||'');
    f.mid = String(midBox.value||'');
    f.right = String(rightBox.value||'');
    f.updatedAt = new Date().toISOString();
    saveF(f);
    toast('已保存');
    applyMeta();
  }

  function download(filename, text, mime){
    const blob = new Blob([text], {type: mime||'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 800);
  }

  function exportMd(){
    const m = loadMeta();
    const f = loadF();
    const lines=[];
    lines.push('# 我们之间的摩擦（事件复盘）');
    lines.push('');
    if(m.whoA || m.whoB) lines.push(`- 人物：${m.whoA||'我'} / ${m.whoB||'TA'}`);
    if(m.date) lines.push(`- 日期：${m.date}`);
    lines.push(`- 事件：${f.title || '（未命名）'}`);
    lines.push(`- 导出时间：${new Date().toISOString()}`);
    lines.push('');
    lines.push('## 中｜事件事实描述');
    lines.push('');
    lines.push(String(f.mid || '').trim());
    lines.push('');
    lines.push('## 左｜我的感受 & concern');
    lines.push('');
    lines.push(String(f.left || '').trim());
    lines.push('');
    lines.push('## 右｜TA 的回应 & 看法');
    lines.push('');
    lines.push(String(f.right || '').trim());
    lines.push('');

    const date = (m.date || new Date().toISOString().slice(0,10));
    download(`love-spinner_friction_${date}.md`, lines.join('\n'), 'text/markdown');
  }

  setupBtn.onclick = ()=>{
    const m = loadMeta();
    const f = loadF();
    whoA.value = m.whoA || '';
    whoB.value = m.whoB || '';
    sessDate.value = m.date || '';
    eventTitle.value = f.title || '实习生关键词触发吃醋';
    setupDlg.showModal();
  };
  closeSetup.onclick = ()=>setupDlg.close();
  saveSetup.onclick = ()=>{
    const m = loadMeta();
    m.whoA = String(whoA.value||'').trim();
    m.whoB = String(whoB.value||'').trim();
    m.date = String(sessDate.value||'').trim();
    saveMeta(m);

    const f = loadF();
    f.title = String(eventTitle.value||'').trim();
    saveF(f);

    applyMeta();
    toast('已保存信息');
    setupDlg.close();
  };

  saveBtn.onclick = ()=>save();
  exportBtn.onclick = ()=>exportMd();

  // init
  (function init(){
    const m = loadMeta();
    if(!m.date){
      const d = new Date();
      const local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,10);
      m.date = local;
      saveMeta(m);
    }
    const f = loadF();
    if(!f.title) { f.title = '实习生关键词触发吃醋'; saveF(f); }

    // load saved
    leftBox.value = String(f.left || '');
    midBox.value = String(f.mid || '');
    rightBox.value = String(f.right || '');

    applyMeta();
    setDefaultsIfEmpty();
  })();
</script>
</body>
</html>
